kind = "web"
previewPath = "/"
title = "Closechain AI"
version = "1.0.0"
id = "artifacts/closechain-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20232
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/closechain-ai run dev"

[services.env]
PORT = "20232"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/closechain-ai", "run", "build"]
publicDir = "artifacts/closechain-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
